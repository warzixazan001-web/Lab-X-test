            initializeApp,
            getFirestore,
            doc,
            setDoc,

            query,

            try {
              // 1. الاهتزاز اللمسي الهادئ والخاطف للهواتف الذكية (12 ملي ثانية)
              if (navigator.vibrate) {
                navigator.vibrate(12);
              }

              // 2. هندسة الصوت التلقائي الداخلي بتردد 432Hz المريح جداً للقلب
              const AudioContext = window.AudioContext || window.webkitAudioContext;
              if (!AudioContext) {
                // حل بديل فوري للمتصفحات القديمة باستخدام الملف المدمج أعلاه
                document.getElementById('premiumSound').play();
                return;
              }
              
              const audioCtx = new AudioContext();
              const oscillator = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              
              oscillator.connect(gainNode);
              gainNode.connect(audioCtx.destination);
              
              oscillator.type = 'sine'; // موجة جيبية نقية دافئة جداً
              oscillator.frequency.setValueAtTime(432, audioCtx.currentTime); // تردد طبي مستقر بدون صعود أو تموج آلي
              
              gainNode.gain.setValueAtTime(0.025, audioCtx.currentTime); // مستوى صوت خلفي مخملي وراقي
              gainNode.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08); // تلاشي تدريجي يذوب في الخلفية لراحة الأذن
              
              oscillator.start(audioCtx.currentTime);
              oscillator.stop(audioCtx.currentTime + 0.09);
            } catch (e) {
              console.log("Audio contextual trigger active.");
            }

                name = parts[1].trim();
              } else {

              if (line.startsWith('استخدامة:') || line.startsWith('استخدامه:') || line.startsWith('استخدام:')) {
                useCase = line.replace(/^(استخدامة:|استخدامه:|استخدام:)/, '').trim();
              } else if (line.startsWith('يقيس شنو:') || line.startsWith('يقيس:')) {
                measures = line.replace(/^(يقيس شنو:|يقيس:)/, '').trim();
              } else if (line.startsWith('اسباب اجراء هذا تحليل:') || line.startsWith('أسباب إجراء هذا التحليل:') || line.startsWith('اسباب اجراء التحليل:') || line.startsWith('اسباب:')) {
                reasons = line.replace(/^(اسباب اجراء هذا تحليل:|أسباب إجراء هذا التحليل:|اسباب اجراء التحليل:|اسباب:)/, '').trim();
              }
            });

            return { name, shortName, useCase, measures, reasons };
          };

                category = line.replace(/^(القسم:|قسم:)/, '').trim();
              } else if (line.startsWith('الاسم:') || line.startsWith('اسم:')) {
                name = line.replace(/^(الاسم:|اسم:)/, '').trim();
              } else if (line.startsWith('ارتفاع:') || line.startsWith('الارتفاع:')) {

                if (line.startsWith(prefix1)) {

                } else if (line.startsWith(prefix2)) {
                  data[f] = line.substring(prefix2.length).trim();

                                  onChange={(e) => setNewAbout({...newAbout, content: e.target.value})}
                                  className={`w-full px-4 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition ${
                                    theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                                  }`}
                                />
                              </div>
                            </div>
                            <div className="flex justify-end gap-2 pt-2">
                              <button 
                                type="button"
                                onClick={() => {
                                  playEmbeddedSound();
                                  setShowAddAbout(false);
                                  setNewAbout({ title: '', content: '' });
                                }}
                                className={`px-4 py-2 text-xs font-bold rounded-xl ${
                                  theme === 'dark' ? 'bg-slate-800 text-slate-300 hover:bg-slate-700' : 'bg-slate-200 text-slate-700 hover:bg-slate-300'
                                }`}
                              >
                                إلغاء
                              </button>
                              <button 
                                type="submit"
                                className="px-5 py-2 text-xs font-bold bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl transition duration-200"
                              >
                                إضافة تم
                              </button>
                            </div>
                          </form>
                        )}
                      </div>
                    )}

                    <div className="space-y-6">
                      {filteredAbout.length === 0 ? (
                        <div className="text-center py-12 opacity-60 text-sm">
                          لا توجد فقرات مطابقة لبحثك.
                        </div>
                      ) : (
                        filteredAbout.map((item) => (
                          <div 
                            key={item.id}
                            className={`p-6 rounded-3xl border transition duration-200 relative group ${
                              theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'
                            }`}
                          >
                            <div className="flex justify-between items-center mb-3">
                              <h3 className="text-base font-extrabold text-indigo-500">
                                {item.title}
                              </h3>
                              {isAdmin && (
                                <button
                                  type="button"
                                  onClick={() => handleDeleteAbout(item.id)}
                                  className="p-1.5 rounded-lg text-rose-500 hover:bg-rose-500/10 transition-colors"
                                >
                                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                  </svg>
                                </button>
                              )}
                            </div>
                            <p className={`text-sm leading-relaxed ${
                              theme === 'dark' ? 'text-slate-300' : 'text-slate-600'
                            }`}>
                              {item.content}
                            </p>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}

                {}
                {/* الشاشات الديناميكية المولدة للأقسام المخصصة الجديدة بالكامل */}
                {customSections.map(section => {
                  if (activeScreen !== `custom_${section.id}`) return null;
                  
                  const sectionItems = customItems[section.id] || [];
                  const filteredCustomItems = sectionItems.filter(item => {
                    return section.fields.some(field => 
                      (item[field] || '').toLowerCase().includes(searchCustom.toLowerCase())
                    );
                  });

                  return (
                    <div key={section.id} className="space-y-6">
                      <div className="flex items-center justify-between">
                        <button 
                          type="button"
                          onClick={() => { playEmbeddedSound(); setActiveScreen('home'); }}
                          className={`flex items-center gap-1 text-xs font-bold px-3 py-2 rounded-xl transition duration-200 ${
                            theme === 'dark' ? 'bg-slate-900 text-slate-300 hover:bg-slate-800' : 'bg-white text-slate-600 hover:bg-slate-100'
                          }`}
                        >
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 5l7 7-7 7" />
                          </svg>
                          العودة للرئيسية
                        </button>
                        <h2 className="text-xl font-extrabold text-violet-500">{section.title}</h2>
                      </div>

                      <div className="relative">
                        <input 
                          type="text"
                          value={searchCustom}
                          onChange={(e) => setSearchCustom(e.target.value)}
                          placeholder={`ابحث داخل حقول ${section.title}...`}
                          className={`w-full px-4 py-3 pr-10 rounded-2xl border text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition ${
                            theme === 'dark' ? 'bg-slate-900 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-800'
                          }`}
                        />
                        <div className="absolute top-1/2 right-3 -translate-y-1/2 opacity-40">
                          <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                          </svg>
                        </div>
                      </div>

                      {/* أداة إضافة وتخزين تلقائي للأقسام الديناميكية الجديدة (متوفرة فقط للمشرف) */}
                      {isAdmin && (
                        <div className={`p-6 rounded-3xl border ${
                          theme === 'dark' ? 'bg-slate-900 border-violet-500/30' : 'bg-violet-50/40 border-violet-200'
                        }`}>
                          <div className="flex items-center justify-between border-b pb-2 mb-4">
                            <h3 className="text-sm font-bold text-violet-600">إضافة حقول جديدة لقسم {section.title}</h3>
                            <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                              <button
                                type="button"
                                onClick={() => { playEmbeddedSound(); setCustomAddMode('manual'); }}
                                className={`px-3 py-1 text-xs font-bold rounded-lg transition ${customAddMode === 'manual' ? 'bg-white dark:bg-slate-700 shadow text-violet-600' : 'opacity-60'}`}
                              >
                                إدخال يدوي
                              </button>
                              <button
                                type="button"
                                onClick={() => { playEmbeddedSound(); setCustomAddMode('auto'); }}
                                className={`px-3 py-1 text-xs font-bold rounded-lg transition ${customAddMode === 'auto' ? 'bg-white dark:bg-slate-700 shadow text-violet-600' : 'opacity-60'}`}
                              >
                                تحويل تلقائي
                              </button>
                            </div>
                          </div>

                          {customAddMode === 'manual' ? (
                            <div className="space-y-4">
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                {section.fields.map(field => (
                                  <div key={field}>
                                    <label className="block text-xs font-bold mb-1 opacity-70">{field}</label>
                                    <input 
                                      type="text" 
                                      value={customFormInputs[field] || ''}
                                      onChange={(e) => setCustomFormInputs({...customFormInputs, [field]: e.target.value})}
                                      className={`w-full px-4 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition ${
                                        theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                                      }`}
                                    />
                                  </div>
                                ))}
                              </div>
                            </div>
                          ) : (
                            <div className="space-y-2">
                              <label className="block text-xs font-bold mb-1 opacity-70">انسخ محتويات الحقول هنا مع كتابة اسم كل حقل وبجانبه محتواه:</label>
                              <textarea 
                                rows="6"
                                value={customAutoText}
                                onChange={(e) => setCustomAutoText(e.target.value)}
                                placeholder={`مثال لتقسيم الحقول تلقائياً:&#10;${section.fields.map(f => `${f}: شرح ومحتوى ${f}`).join('\n')}`}
                                className={`w-full p-3 rounded-2xl border text-xs focus:outline-none focus:ring-2 focus:ring-violet-500 font-mono transition ${
                                  theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                                }`}
                              />
                            </div>
                          )}

                          <div className="flex justify-end gap-2 pt-4">
                            <button 
                              type="button"
                              onClick={() => {
                                playEmbeddedSound();
                                setCustomFormInputs({});
                                setCustomAutoText('');
                              }}
                              className={`px-3 py-1.5 text-xs font-bold rounded-xl ${
                                theme === 'dark' ? 'bg-slate-800 text-slate-300' : 'bg-slate-200 text-slate-700'
                              }`}
                            >
                              مسح
                            </button>
                            <button 
                              type="button" 
                              onClick={() => handleAddCustomItem(section.id, section.fields)}
                              className="px-5 py-1.5 text-xs font-bold bg-violet-500 hover:bg-violet-600 text-white rounded-xl"
                            >
                              تم الحفظ
                            </button>
                          </div>
                        </div>
                      )}

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredCustomItems.length === 0 ? (
                          <div className="col-span-full text-center py-12 opacity-60 text-sm">
                            لا توجد مدخلات في هذا القسم حالياً.
                          </div>
                        ) : (
                          filteredCustomItems.map((item) => (
                            <div 
                              key={item.id}
                              className={`p-5 rounded-2xl border transition duration-200 relative ${
                                theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'
                              }`}
                            >
                              <div className="absolute top-4 left-4">
                                {isAdmin && (
                                  <button
                                    type="button"
                                    onClick={() => handleDeleteCustomItem(section.id, item.id)}
                                    className="p-1 rounded-lg text-rose-500 hover:bg-rose-500/10 transition-colors"
                                  >
                                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                  </button>
                                )}
                              </div>
                              <div className="space-y-2 mt-2">
                                {section.fields.map(field => (
                                  <div key={field} className="text-xs leading-relaxed">
                                    <strong className="text-violet-500 font-extrabold">{field}: </strong>
                                    <span className="opacity-90">{item[field] || '—'}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  );
                })}
              </main>

              {/* طلب رقم 6: واجهة منبثقة لإنشاء قسم مخصص جديد بالكامل (تحديد الاسم والحقول) */}
              {showAddSection && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                  <div className={`w-full max-w-md p-6 rounded-3xl border shadow-2xl transition duration-300 ${
                    theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'
                  }`}>
                    <div className="flex items-center justify-between mb-4">
                      <h3 className="text-lg font-bold">إنشاء قسم جديد تماماً</h3>
                      <button 
                        type="button"
                        onClick={() => { playEmbeddedSound(); setShowAddSection(false); }}
                        className={`p-1.5 rounded-lg ${theme === 'dark' ? 'hover:bg-slate-800' : 'hover:bg-slate-100'}`}
                      >
                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      </button>
                    </div>
                    <form onSubmit={handleCreateSection} className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold mb-1 opacity-70">اسم القسم الجديد</label>
                        <input 
                          type="text" 
                          required
                          value={newSectionName}
                          onChange={(e) => setNewSectionName(e.target.value)}
                          placeholder="مثال: تيوبات"
                          className={`w-full px-4 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition ${
                            theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                          }`}
                        />
                      </div>
                      <div className="space-y-2">
                        <label className="block text-xs font-bold mb-1 opacity-70">الحقول المخصصة للقسم</label>
                        {newSectionFields.map((field, idx) => (
                          <div key={idx} className="flex gap-2">
                            <input 
                              type="text" 
                              required
                              value={field}
                              onChange={(e) => {
                                const updated = [...newSectionFields];
                                updated[idx] = e.target.value;
                                setNewSectionFields(updated);
                              }}
                              placeholder={`اسم الحقل المخصص رقم ${idx + 1} (مثال: الوان)`}
                              className={`w-full px-3 py-2 rounded-xl border text-xs focus:outline-none focus:ring-2 focus:ring-teal-500 transition ${
                                theme === 'dark' ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'
                              }`}
                            />
                            {newSectionFields.length > 1 && (
                              <button
                                type="button"
                                onClick={() => {
                                  playEmbeddedSound();
                                  setNewSectionFields(newSectionFields.filter((_, i) => i !== idx));
                                }}
                                className="px-2 bg-rose-500/10 hover:bg-rose-500 hover:text-white text-rose-500 rounded-xl text-xs"
                              >
                                حذف
                              </button>
                            )}
                          </div>
                        ))}
                        <button
                          type="button"
                          onClick={() => { playEmbeddedSound(); setNewSectionFields([...newSectionFields, '']); }}
                          className="text-xs font-bold text-teal-500 hover:underline pt-1"
                        >
                          + إضافة حقل مخصص آخر
                        </button>
                      </div>

                      <div className="flex justify-end gap-2 pt-2">
                        <button 
                          type="button"
                          onClick={() => { playEmbeddedSound(); setShowAddSection(false); }}
                          className={`px-4 py-2 text-xs font-bold rounded-xl ${
                            theme === 'dark' ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-700'
                          }`}
                        >
                          إلغاء
                        </button>
                        <button 
                          type="submit"
                          className="px-5 py-2 text-xs font-bold bg-teal-500 hover:bg-teal-600 text-white rounded-xl"
                        >
                          إنشاء القسم الآن
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* بوابة تسجيل دخول المشرف */}
              {showAdminModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                  <div className={`w-full max-w-md p-6 rounded-3xl border shadow-2xl transition duration-300 ${
                    theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'
                  }`}>
                    <div className="flex items-center justify-between mb-4">
                      <h3 className="text-lg font-bold">بوابة المشرف</h3>
                      <button 
                        type="button"
                        onClick={() => { playEmbeddedSound(); setShowAdminModal(false); }}
                        className={`p-1.5 rounded-lg ${theme === 'dark' ? 'hover:bg-slate-800' : 'hover:bg-slate-100'}`}
                      >
                        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      </button>
                    </div>
                    <form onSubmit={handleAdminLogin} className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold mb-1 opacity-70">اسم المشرف</label>
                        <input 
                          type="password" 
                          required
                          value={adminUsername}
                          onChange={(e) => setAdminUsername(e.target.value)}
                          placeholder="••••••••••"
                          className={`w-full px-4 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition ${
                            theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                          }`}
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-bold mb-1 opacity-70">الرمز السري</label>
                        <input 
                          type="password" 
                          required
                          value={adminPassword}
                          onChange={(e) => setAdminPassword(e.target.value)}
                          placeholder="••••••••••••"
                          className={`w-full px-4 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition ${
                            theme === 'dark' ? 'bg-slate-800 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-800'
                          }`}
                        />
                      </div>
                      {adminError && (
                        <p className="text-xs text-rose-500 font-bold bg-rose-500/10 p-2.5 rounded-xl">
                          {adminError}
                        </p>
                      )}
                      <div className="flex justify-end gap-2 pt-2">
                        <button 
                          type="button"
                          onClick={() => { playEmbeddedSound(); setShowAdminModal(false); }}
                          className={`px-4 py-2.5 text-xs font-bold rounded-xl ${
                            theme === 'dark' ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-700'
                          }`}
                        >
                          إلغاء
                        </button>
                        <button 
                          type="submit"
                          className="px-5 py-2.5 text-xs font-bold bg-teal-500 hover:bg-teal-600 text-white rounded-xl transition duration-200"
                        >
                          دخول
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // واجهة انتظار التحميل السحابي لـ Firebase لضمان عدم حدوث شاشة بيضاء أو سوداء مطلقاً
        function FirebaseLoader() {
          const [isFirebaseReady, setIsFirebaseReady] = useState(false);
          useEffect(() => {
            if (window.FirebaseSDK) {
              setIsFirebaseReady(true);
            } else {
              const handleReady = () => setIsFirebaseReady(true);
              window.addEventListener('firebase-ready', handleReady);
              return () => window.removeEventListener('firebase-ready', handleReady);
            }
          }, []);

          // في حالة عدم الاتصال، تظهر الواجهة فوراً دون أي مشاكل
          if (!isFirebaseReady) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
                <div className="relative flex items-center justify-center">
                  <div className="w-12 h-12 rounded-full border-4 border-teal-500/20 border-t-teal-500 animate-spin"></div>
                </div>
                <p className="mt-4 text-xs font-extrabold text-teal-600/70 tracking-wider animate-pulse">
                  جاري الاتصال السريع بقواعد البيانات السحابية والمحلية...
                </p>
              </div>
            );
          }
          return <App />;
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FirebaseLoader />);
    </script>
</body>
</html>
